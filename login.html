<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Linge & Seduções ERP</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#202940;
}

.login{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login h1{
    text-align:center;
    margin-bottom:25px;
    color:#202940;
}

.login input{
    width:100%;
    margin-bottom:15px;
}

.login button{
    width:100%;
    background:#0b8f42;
    font-size:16px;
}

</style>

</head>

<body>

<div class="login">

<h1>🔐 Linge & Seduções ERP</h1>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="entrar()">

Entrar

</button>

</div>

<script>

function entrar(){

    let senhaSistema = localStorage.getItem("senhaERP") || "1234";
    let senha = document.getElementById("senha").value;

    if(senha === senhaSistema){

        localStorage.setItem("logado","sim");

        window.location.href="index.html";

    }else{

        alert("Senha incorreta!");

    }

}

</script>

</body>
</html>
