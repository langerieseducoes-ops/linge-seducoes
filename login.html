<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Linge & Seduções ERP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

    <h1>Linge & Seduções ERP</h1>

    <h3>Login do Sistema</h3>

    <input
        id="usuario"
        type="text"
        placeholder="Usuário">

        id="senha"
        type="password"
        placeholder="Senha">

    <button onclick="fazerLogin()">

        Entrar

    </button>

</div>

<script src="js/login.js"></script>

</body>

</html>
