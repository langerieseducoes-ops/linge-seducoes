<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Linge & Seduções - Sistema de Estoque</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="menu">

    <h2>Linge & Seduções</h2>

    <ul>

        <li>🏠 Dashboard</li>
        <li>📦 Produtos</li>
        <li>📥 Entrada</li>
        <li>📤 Saída</li>
        <li>💰 Vendas</li>
        <li>👥 Clientes</li>
        <li>🚚 Fornecedores</li>
        <li>📊 Relatórios</li>

    </ul>

</div>

<div class="conteudo">

<header>

<h1>Controle de Estoque</h1>

</header>

<div class="painel">

<div class="card">

<h3>Produtos</h3>

<h2 id="totalProdutos">0</h2>

</div>

<div class="card">

<h3>Estoque</h3>

<h2 id="totalEstoque">0</h2>

</div>

</div>

<div class="cadastro">

<input id="codigo" placeholder="Código">

<input id="produto" placeholder="Produto">

<input id="categoria" placeholder="Categoria">

<input id="cor" placeholder="Cor">

<input id="tamanho" placeholder="Tamanho">

<input id="custo" type="number" placeholder="Custo">

<input id="venda" type="number" placeholder="Venda">

<input id="quantidade" type="number" placeholder="Quantidade">

<button onclick="adicionarProduto()">

Adicionar Produto

</button>

</div>

<input
id="pesquisa"
placeholder="Pesquisar..."
onkeyup="pesquisarProduto()">

<table>

<thead>

<tr>

<th>Código</th>
<th>Produto</th>
<th>Categoria</th>
<th>Cor</th>
<th>Tamanho</th>
<th>Custo</th>
<th>Venda</th>
<th>Qtd</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaProdutos">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
