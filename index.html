<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Linge & Seduções ERP</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{

    width:100%;
    max-width:400px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.20);
}

.login-box h1{

    text-align:center;
    color:#202940;
    margin-bottom:10px;

}

.login-box p{

    text-align:center;
    color:#666;
    margin-bottom:25px;

}

.login-box input{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;

}

.login-box button{

    width:100%;
    padding:14px;
    background:#0b8f42;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;

}

.login-box button:hover{

    background:#087536;

}

</style>

</head>

<body>

<div class="login-box">

<h1>Linge & Seduções ERP</h1>

<p>Entre com sua senha</p>

<label for="usuario">Usuário</label>

<input
id="usuario"
type="text"
placeholder="Usuário"
autocomplete="username">

<label for="senha">Senha</label>

<input
id="senha"
type="password"
placeholder="Senha"
autocomplete="current-password">
    
<button onclick="entrar()">
Entrar
</button>

</div>

<script>
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        entrar();

    }

});
</script>

<script src="js/login.js"></script>

</body>

</html>
